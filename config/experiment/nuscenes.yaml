# @package _global_

defaults:
  - /dataset@_group_.nuscenes: nuscenes
  - override /model/encoder: anysplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse, lpips, depth_consis] # ablate: opacity loss

wandb:
  project: anysplat_04_sup_gs_Lora_distill_recon
  name: nuScenes_omnivggt_finetune
  tags: [nuScenes, 294x518]
  mode: disabled # online offline disabled
  tensorboard: true # only effective when mode=disabled; true -> log scalar curves to TensorBoard
  
model:
  encoder:
    gs_params_head_type: dpt_gs
    pose_free: true
    intrinsics_embed_loc: encoder
    intrinsics_embed_type: token
    pretrained_weights: ''
    voxel_size: 0.025
    pred_pose: true
    anchor_feat_dim: 128
    gs_prune: false # ablate: opacity loss
    pred_head_type: depth
    freeze_backbone: false # means freeze aggregator and depth head
    use_lora_aggregator: false # only when freeze_backbone is false, this flag is effective
    freeze_patch_embed_in_lora: true # true: LoRA 不作用于 patch_embed 相关层
    useOG_OmniVGGT: false
    export_pt_path: 'checkpoints/distill_recon_dwsplat/e5s1w2_distill_recon' # only when useOG_OmniVGGT is false, this path is effective
    # aggregator_merged.ckpt depth_head.ckpt
    distill: true
    frozenAggregator: true # not used
    frozenGaussianHead: false
    useDGGTGaussianHead: false
    frozenDepthHead: false
    NotUsePretrainedGaussianHead: false
    gshead_pt_path: 'checkpoints/gshead_pt/merged_0202_epoch5/gaussian_param_head_weights.pth' # only when NotUsePretrainedGaussianHead is false, this path is effective
    min_depth: 1.5
    max_depth: 110.0
    render_conf: false
    conf_threshold: 0.1
    freeze_module: all # only when freeze_backbone and use_lora_aggregator is false, this flag is effective; patch_embed means only freeze patch_embed; none means not freeze
    voxelize: true
    intermediate_layer_idx: [4, 11, 17, 23]
    enable_high_conf_supplement: false
    high_conf_supplement_quantile: 0.8
    
dataset:
  nuscenes:
    input_image_shape: [294, 518] # [252, 448] [294, 518]
    view_sampler:
      num_context_views: 3 # keep same with numTimes x 3
      num_target_views: 3
      # min_distance_between_context_views: 32
      # max_distance_between_context_views: 256
      max_img_per_gpu: 15
    avg_pose: false
    intr_augment: false
    normalize_by_pts3d: false
    rescale_to_1cube: false

optimizer:
  lr: 6e-5 
  # 2e-4 and 24 per gpu, 16 gpus
  # 1gpu, 9imgs, 3e-5    linear scale: 4.6e-6
  # 4gpu, 9imgs, 6e-5    linear scale: 1.8e-5
  # 4gpu, 9imgs, gredient_accum 2, 8.6e-5    linear scale: 3.75e-5
  # 8gpu, 24imgs, 1.4e-4    linear scale: 1e-4
  # 4gpu ,24imgs, 1e-4    linear scale: 5e-5  4307
  # 4gpu, 15imgs, 7.9e-5 linear scale: 3.125e-5 6892
  # 2gpu, 15imgs, 5.5e-5 linear scale: 1.56e-5 13785
  warm_up_steps: 2000
  backbone_lr_multiplier: 0.1 #0.1

data_loader:
  train:
    batch_size: 4 # not used here
    
trainer:
  max_steps: 50000
  val_check_interval: 1000
  log_every_n_steps: 20
  print_log_every_n_steps: 50
  num_nodes: 1
  accumulate_grad_batches: 1
  precision: "bf16-mixed" #"32" bf16-mixed

checkpointing:
  load: null
  # load: outputs/exp_OmniVGGT_nuScenes_omnivggt_finetune/2026-04-23_23-51-21/checkpoints/epoch_3-step_25000.ckpt
  log_save_dir: outputs/exp_OmniVGGT_${wandb.name}/${now:%Y-%m-%d_%H-%M-%S}
  flag_gaussian_head: true # 是否读取Gaussian Head的权重
  every_n_train_steps: 5000
  save_weights_only: false
  save_top_k: 100
  
train:
  pose_loss_alpha: 0.0
  pose_loss_delta: 0.0
  cxt_depth_weight: 0.0
  weight_pose: 1.0 #10.0
  weight_depth: 1.0 # loss_depth_l1 + loss_depth_gradient
  weight_depth_l1: 0.02 # gs render depth and distill depth-head metric depth
  weight_depth_gradient: 0.0 # gs render depth and distill depth-head metric depth  
  weight_depth_norm_head_mse: 0.05 # depth-head norm depth adn distill depth-head norm depth
  weight_depth_norm_head_gradient: 0.00 # depth-head norm depth adn distill depth-head norm depth
  weight_depth_scale: 0.02 # explicit median-scale anchor to prevent scene scale collapse
  weight_normal: 0.0
  distill_warmup_steps: 1000
  distill_warmup_start: 0.4
  distill_warmup_end: 1.0

hydra:
  run:
    dir: outputs/exp_OmniVGGT_${wandb.name}/${now:%Y-%m-%d_%H-%M-%S}

loss:
  mse:
    weight: 1.0
    conf: false
    loss_type: mse
  lpips:
    weight: 0.05
    conf: false
  depth_consis:
    weight: 0.001 # 
    loss_type: MSE


